version: '3.8'
services:
  app:
    build: .
    ports:
      - '8000:8000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fastapi_db
      - SECRET_KEY=changeme
    depends_on:
      - mongo
  mongo:
    image: mongo:6.0
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
