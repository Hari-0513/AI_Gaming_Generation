name: Run Python Script

on:
  push:
    branches: [ "main" ]
  # Allows you to click a button in GitHub to run it manually
  workflow_dispatch: 

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Python Script
      run: python app/routers/generator.py